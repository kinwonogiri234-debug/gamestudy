name: study_game
description: "A Flutter thesis management game application."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  animations: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/pixel_avatar_1.png
    - assets/pixel_avatar_2.png
    - assets/pixel_avatar_3.png
    - assets/pixel_avatar_4.png
    - assets/pixel_avatar_5.png
    - assets/pixel_avatar_6.png
    - assets/pixel_avatar_7.png
    - assets/pixel_avatar_8.png
    - assets/pixel_avatar_9.png
    - assets/pixel_avatar_10.png
    - assets/pixel_avatar_wanita_1.png
    - assets/pixel_avatar_wanita_2.png
    - assets/pixel_avatar_wanita_3.png
    - assets/pixel_avatar_wanita_4.png
    - assets/pixel_avatar_wanita_5.png
    - assets/pixel_avatar_wanita_6.png
    - assets/pixel_avatar_wanita_7.png
    - assets/pixel_avatar_wanita_8.png
    - assets/pixel_avatar_wanita_9.png
    - assets/pixel_avatar_wanita_10.png


